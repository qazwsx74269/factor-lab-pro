data:
  source: binance
  binance:
    base_url: https://api.binance.com
    proxy: ""
    days: 3
    rate_limit_sleep_ms: 50
    timeout_s: 20
  cache:
    enabled: true
    dir: ./runs/cache

universe:
  symbols: [BTCUSDT, ETHUSDT]

timeframes: ["15m", "1h"]

backtest:
  base_tf: "15m"
  fwd_period: 4
  top_n: 1
  bottom_n: 1
  fee_rate: 0.0005
  slippage: 0.0002
  capital: 1000000
  index_mode: intersection

mining:
  enabled: true
  ic_window: 64
  ic_min_abs: 0.001
  icir_min_abs: 0.01
  max_valid: 4
  min_cs: 2

research:
  winsor_p: 0.01
  use_orthogonal: true

optimizer:
  lam_risk: 2.0
  lam_l1: 0.05
  lam_tc: 0.20
  w_max: 0.70
  l1_cap: 1.0

strategy_pool:
  enabled: true
  max_active: 3
  score_window: 64
  replace_each_n_steps: 32

execution:
  n_slices: 2
  impact_c: 0.10
  impact_p: 0.50

report:
  out_dir: ./runs
  topk: 10
