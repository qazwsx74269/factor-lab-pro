data:
  source: binance
  binance:
    # 用 Spot 公共接口拉行情（无需 API Key）；价格与合约高度相关
    base_url: https://api.binance.com
    proxy: "http://127.0.0.1:7897"
    days: 30
    rate_limit_sleep_ms: 150
    timeout_s: 20
  cache:
    enabled: true
    dir: ./runs/cache

# 合约主力品种（Spot 端有对应交易对）
universe:
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
    - XRPUSDT
    - DOGEUSDT
    - ADAUSDT
    - AVAXUSDT
    - DOTUSDT
    - LINKUSDT
    - LTCUSDT
    - ATOMUSDT
    - NEARUSDT
    - APTUSDT
    - SUIUSDT
    - TIAUSDT
    - INJUSDT
    - SEIUSDT
    - OPUSDT
    - ARBUSDT

timeframes: ["1m","5m","15m","1h"]

backtest:
  base_tf: "15m"
  fwd_period: 4       # 持仓 4×15m = 1h
  top_n: 3
  bottom_n: 3
  fee_rate: 0.0005    # 合约 0.05% taker
  slippage: 0.0002
  capital: 1000000
  index_mode: intersection  # 只用所有品种都有数据的时间段

mining:
  enabled: true
  ic_window: 256
  ic_min_abs: 0.02
  icir_min_abs: 0.25    # 稍微放松一点
  max_valid: 8
  min_cs: 6

research:
  winsor_p: 0.01
  use_orthogonal: true

optimizer:
  lam_risk: 3.0
  lam_l1: 0.08
  lam_tc: 0.15
  w_max: 0.60
  l1_cap: 1.0

strategy_pool:
  enabled: true
  max_active: 5
  score_window: 192
  replace_each_n_steps: 96

execution:
  n_slices: 4
  impact_c: 0.10
  impact_p: 0.50

report:
  out_dir: ./runs
  topk: 10
