name: Publish Reports to GitHub Pages

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run backtest
        continue-on-error: true
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          mkdir -p runs
          python -m factor_lab run -c configs/demo.yaml > runs/action-run.log 2>&1 || true

      - name: Prepare pages content
        run: |
          mkdir -p public
          if [ -f runs/index.html ]; then
            cp -R runs/. public/
          else
            cat > public/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>Factor Lab Pro</title></head>
          <body>
            <h1>Factor Lab Pro</h1>
            <p>The scheduled run did not produce <code>runs/index.html</code>.</p>
            <p>See <a href="action-run.log">action-run.log</a> for details.</p>
          </body></html>
          HTML
            [ -f runs/action-run.log ] && cp runs/action-run.log public/action-run.log
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          force_orphan: true
