name: Smoke Test

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Doctor
        run: python -m factor_lab doctor

      - name: Run smoke config when proxy is available
        if: ${{ secrets.HTTP_PROXY != '' || secrets.HTTPS_PROXY != '' }}
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: python -m factor_lab run -c configs/smoke.yaml

      - name: Skip smoke backtest without proxy
        if: ${{ secrets.HTTP_PROXY == '' && secrets.HTTPS_PROXY == '' }}
        run: |
          echo "Binance is not reachable from the default GitHub runner in this environment."
          echo "Doctor passed; backtest smoke is skipped until HTTP_PROXY/HTTPS_PROXY secrets are configured."
