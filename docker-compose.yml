services:
  factor-lab-pro:
    build: .
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - FACTOR_LAB_RUNS_DIR=${FACTOR_LAB_RUNS_DIR:-/app/runs}
      - FACTOR_LAB_LOG_LEVEL=${FACTOR_LAB_LOG_LEVEL:-INFO}
    volumes:
      - ./runs:/app/runs
